<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseGrid</title>

  <link rel="stylesheet" href="app.css" />

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .container {
      padding: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1e293b;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #334155;
    }

    .card h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    .status {
      font-size: 14px;
      margin-top: 8px;
    }

    .up {
      color: #22c55e;
    }

    .down {
      color: #ef4444;
    }

    .unknown {
      color: #facc15;
    }

    .meta {
      font-size: 12px;
      color: #94a3b8;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .badge {
      background: #1e40af;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <header>
    <h1>PulseGrid</h1>
    <div class="topbar">
      <span class="badge" id="meta-version">v?</span>
    </div>
  </header>

  <div class="container">
    <div id="summary" class="meta">Loading summary...</div>

    <h2>Monitors</h2>

    <div id="grid" class="grid"></div>
  </div>

  <script>
    const grid = document.getElementById("grid");
    const summary = document.getElementById("summary");
    const metaVersion = document.getElementById("meta-version");

    async function loadMeta() {
      try {
        const res = await fetch("/_meta");
        const data = await res.json();
        metaVersion.textContent = "v" + (data.version || "?");
      } catch {}
    }

    async function loadSummary() {
      try {
        const res = await fetch("/api/status/summary");
        const data = await res.json();

        if (!data.ok) {
          summary.textContent = "Failed to load summary";
          return;
        }

        summary.textContent =
          "Total: " + data.total +
          " • Up: " + data.up +
          " • Down: " + data.down;
      } catch {
        summary.textContent = "Error loading summary";
      }
    }

    function renderMonitor(m) {
      const statusClass =
        m.status === "up" ? "up" :
        m.status === "down" ? "down" :
        "unknown";

      return `
        <div class="card">
          <h3>${m.name}</h3>
          <div class="meta">${m.url}</div>
          <div class="status ${statusClass}">
            ${m.status.toUpperCase()}
          </div>
        </div>
      `;
    }

    async function loadMonitors() {
      try {
        const res = await fetch("/api/monitors");
        const data = await res.json();

        if (!data.ok) {
          grid.innerHTML = "<p>Failed to load monitors</p>";
          return;
        }

        grid.innerHTML = data.data.map(renderMonitor).join("");
      } catch {
        grid.innerHTML = "<p>Error loading monitors</p>";
      }
    }

    async function init() {
      await loadMeta();
      await loadSummary();
      await loadMonitors();
    }

    init();

    setInterval(loadMonitors, 5000);
    setInterval(loadSummary, 5000);
  </script>
</body>
</html>
