<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseGrid</title>

  <link rel="stylesheet" href="/app.css" />

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
    }

    .container {
      padding: 24px;
      display: grid;
      gap: 24px;
    }

    .panel {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1e293b;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #334155;
    }

    .card h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    .status {
      font-size: 14px;
      margin-top: 8px;
      font-weight: 600;
    }

    .up {
      color: #22c55e;
    }

    .down {
      color: #ef4444;
    }

    .degraded {
      color: #facc15;
    }

    .paused,
    .unknown {
      color: #cbd5e1;
    }

    .meta {
      font-size: 12px;
      color: #94a3b8;
      word-break: break-word;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .badge {
      background: #1e40af;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
    }

    .summary-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 14px 16px;
      color: #cbd5e1;
    }

    .empty {
      color: #94a3b8;
      font-size: 14px;
      padding: 12px 0;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-size: 13px;
      color: #cbd5e1;
      font-weight: 600;
    }

    .field input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 12px 14px;
      outline: none;
    }

    .field input:focus {
      border-color: #60a5fa;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 8px;
      padding: 12px 16px;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    .form-message {
      font-size: 14px;
      color: #94a3b8;
      min-height: 20px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 16px;
      }

      header {
        padding: 14px 16px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>PulseGrid</h1>
    <div class="topbar">
      <span class="badge" id="meta-version">v?</span>
    </div>
  </header>

  <div class="container">
    <section class="panel">
      <h2>Create monitor</h2>

      <form id="create-monitor-form">
        <div class="form-grid">
          <div class="field">
            <label for="monitor-name">Name</label>
            <input
              id="monitor-name"
              name="name"
              type="text"
              placeholder="Homepage"
              required
            />
          </div>

          <div class="field">
            <label for="monitor-slug">Slug</label>
            <input
              id="monitor-slug"
              name="slug"
              type="text"
              placeholder="homepage"
              required
            />
          </div>

          <div class="field">
            <label for="monitor-url">URL</label>
            <input
              id="monitor-url"
              name="url"
              type="url"
              placeholder="https://example.com"
              required
            />
          </div>

          <div class="field">
            <label for="monitor-interval">Interval (seconds)</label>
            <input
              id="monitor-interval"
              name="interval_seconds"
              type="number"
              min="5"
              step="1"
              value="60"
              required
            />
          </div>
        </div>

        <div class="actions">
          <button class="btn" type="submit">Create monitor</button>
          <div id="form-message" class="form-message"></div>
        </div>
      </form>
    </section>

    <section>
      <div id="summary" class="summary-box">Loading summary...</div>
    </section>

    <section>
      <h2>Monitors</h2>
      <div id="grid" class="grid"></div>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
