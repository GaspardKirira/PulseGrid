<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseGrid Status</title>

  <link rel="stylesheet" href="/status.css" />
</head>

<body>
  <div class="status-page">
    <header class="status-header">
      <div class="status-header__inner">
        <strong class="status-brand">PulseGrid</strong>
        <a href="/" class="status-back-link">← Dashboard</a>
      </div>
    </header>

    <main class="status-container">
      <div id="error-box" class="error-box hidden"></div>

      <section id="hero" class="status-hero hidden">
        <h1 id="monitor-name" class="status-hero__title">Monitor</h1>
        <div id="monitor-url" class="status-subtle"></div>
        <div id="monitor-meta" class="status-subtle status-subtle--spaced"></div>
        <div id="monitor-status-pill" class="status-pill">UNKNOWN</div>
      </section>

      <section id="metrics" class="status-metrics-grid hidden">
        <article class="status-card">
          <h2 class="status-card__title">Latest check</h2>
          <div id="latest-check-status" class="status-card__value">—</div>
          <div class="status-card__label">Current check result</div>
        </article>

        <article class="status-card">
          <h2 class="status-card__title">Response time</h2>
          <div id="response-time" class="status-card__value">—</div>
          <div class="status-card__label">Measured on the latest check</div>
        </article>

        <article class="status-card">
          <h2 class="status-card__title">Checked at</h2>
          <div id="checked-at" class="status-card__value">—</div>
          <div class="status-card__label">Last recorded check</div>
        </article>
      </section>

      <section id="incident-box" class="status-incident hidden">
        <h2 class="status-incident__title">Open incident</h2>
        <div id="incident-message" class="status-incident__message"></div>
        <div id="incident-started" class="status-subtle"></div>
      </section>
    </main>
  </div>

  <script src="/status.js"></script>
</body>
</html>
